<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#1F3864"/>
<title>CM Revº. Benjamim Manuel</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
body{background:#f0f2f5;min-height:100vh}
.header{background:linear-gradient(135deg,#1F3864,#2E5096);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.header-title{color:#fff;font-weight:800;font-size:15px;font-family:Georgia,serif}
.header-sub{color:#ffffffcc;font-size:11px}
.tabs{display:flex;gap:4px;padding:8px 16px 0;background:linear-gradient(135deg,#1F3864,#2E5096)}
.tab{padding:8px 16px;border:none;cursor:pointer;font-weight:700;font-size:12px;border-radius:8px 8px 0 0;background:transparent;color:#ffffffaa;border-bottom:3px solid transparent}
.tab.active{background:#fff;color:#1F3864;border-bottom:3px solid #7B3F00}
.content{padding:14px 16px;max-width:1000px;margin:0 auto}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px}
.btn-primary{background:linear-gradient(135deg,#1F3864,#2E5096);color:#fff}
.btn-danger{background:#FFF3F3;color:#B71C1C}
.btn-edit{background:#EEF2FF;color:#1F3864}
input,select{width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:7px;font-size:13px;outline:none;background:#fafafa}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 8px;background:linear-gradient(90deg,#1F3864,#2E5096);color:#fff;text-align:left;font-size:10px;text-transform:uppercase}
td{padding:8px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#EEF2FF}
.badge{border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700;white-space:nowrap}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{background:linear-gradient(135deg,#1F3864,#2E5096);padding:14px 18px;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:center;color:#fff;font-weight:800;font-size:14px;font-family:Georgia,serif}
.modal-body{padding:16px 18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.full{grid-column:1/-1}
label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;display:block}
.card{background:#fff;border-radius:10px;padding:13px 16px;flex:1 1 100px;border-left:4px solid var(--c);box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card-val{font-size:22px;font-weight:900;color:var(--c);font-family:Georgia,serif}
.card-lbl{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;margin-top:3px}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center}
.filters input,.filters select{width:auto;flex:1 1 140px}
.toast{position:fixed;top:16px;right:16px;z-index:9999;padding:11px 18px;border-radius:10px;font-weight:700;font-size:13px;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,0.25)}
.aviso{background:#FFF3E0;border:1px solid #FFB74D;border-radius:8px;padding:8px 14px;font-size:12px;color:#E65100;margin-bottom:10px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const COR={azul:"#1F3864",dourado:"#7B3F00",verde:"#1B5E20",verm:"#B71C1C",cinza:"#37474F"};
const CLASSES=["Nazaré de Castro","Castro João dos Santos","Revº Diogo de Sousa"];
const ORGANISMOS=["Organização dos Homens","Organização das Mulheres","OJA","Juventude","Ministério com Crianças","Nenhum"];
const STATUS=["Catecúmeno","À Prova","Efectivo","Falecido","Transferido"];
const SEXO=["Masculino","Feminino"];
const GUIAS={"Nazaré de Castro":"Marolina Bule Domingos","Castro João dos Santos":"Eva Francisco Ernesto","Revº Diogo de Sousa":"Florinda André João"};
const DIRECTORES={"Organização dos Homens":"Mateus Zombo","Organização das Mulheres":"Teresa Manuel João","OJA":"Dionísia N. Samuel","Juventude":"Por nomear","Ministério com Crianças":"Rodrigues Luís Dembo"};

// 1 Admin + 10 Editores + 6 Leitores — cada um com código único
const UTILIZADORES=[
  {id:"admin",  nome:"Administrador", codigo:"CMB2026",  perfil:"admin",  cor:COR.azul,   icone:"🔐"},
  {id:"editor1",nome:"Editor 1",      codigo:"EDIT0126", perfil:"editor", cor:COR.verde,  icone:"✏️"},
  {id:"editor2",nome:"Editor 2",      codigo:"EDIT0226", perfil:"editor", cor:COR.verde,  icone:"✏️"},
  {id:"editor3",nome:"Editor 3",      codigo:"EDIT0326", perfil:"editor", cor:COR.verde,  icone:"✏️"},
  {id:"editor4",nome:"Editor 4",      codigo:"EDIT0426", perfil:"editor", cor:COR.verde,  icone:"✏️"},
  {id:"editor5",nome:"Editor 5",      codigo:"EDIT0526", perfil:"editor", cor:COR.verde,  icone:"✏️"},
  {id:"editor6",nome:"Editor 6",      codigo:"EDIT0626", perfil:"editor", cor:COR.verde,  icone:"✏️"},
  {id:"editor7",nome:"Editor 7",      codigo:"EDIT0726", perfil:"editor", cor:COR.verde,  icone:"✏️"},
  {id:"editor8",nome:"Editor 8",      codigo:"EDIT0826", perfil:"editor", cor:COR.verde,  icone:"✏️"},
  {id:"editor9",nome:"Editor 9",      codigo:"EDIT0926", perfil:"editor", cor:COR.verde,  icone:"✏️"},
  {id:"editor10",nome:"Editor 10",    codigo:"EDIT1026", perfil:"editor", cor:COR.verde,  icone:"✏️"},
  {id:"leitor1",nome:"Leitor 1",      codigo:"LEIT0126", perfil:"leitor", cor:COR.dourado,icone:"👁"},
  {id:"leitor2",nome:"Leitor 2",      codigo:"LEIT0226", perfil:"leitor", cor:COR.dourado,icone:"👁"},
  {id:"leitor3",nome:"Leitor 3",      codigo:"LEIT0326", perfil:"leitor", cor:COR.dourado,icone:"👁"},
  {id:"leitor4",nome:"Leitor 4",      codigo:"LEIT0426", perfil:"leitor", cor:COR.dourado,icone:"👁"},
  {id:"leitor5",nome:"Leitor 5",      codigo:"LEIT0526", perfil:"leitor", cor:COR.dourado,icone:"👁"},
  {id:"leitor6",nome:"Leitor 6",      codigo:"LEIT0626", perfil:"leitor", cor:COR.dourado,icone:"👁"},
];

const DADOS_INICIAIS=[
  {id:1,nome:"Marolina Bule Domingos",classe:"Nazaré de Castro",sexo:"Feminino",status:"Efectivo",organismo:"Organização das Mulheres",baptizado:true,dataBaptismo:"2018-03-10",telefone:"",obs:"Guia de Classe",autor:"admin"},
  {id:2,nome:"Adão Lopes Mainga",classe:"Nazaré de Castro",sexo:"Masculino",status:"Efectivo",organismo:"Organização dos Homens",baptizado:true,dataBaptismo:"2015-06-14",telefone:"",obs:"Vice Guia Leigo",autor:"admin"},
  {id:3,nome:"Teresa Manuel João",classe:"Nazaré de Castro",sexo:"Feminino",status:"Efectivo",organismo:"Organização das Mulheres",baptizado:true,dataBaptismo:"2012-11-20",telefone:"",obs:"Directora Org. Mulheres",autor:"admin"},
  {id:4,nome:"Beatriz Gaspar Cavunga",classe:"Nazaré de Castro",sexo:"Feminino",status:"Efectivo",organismo:"Organização das Mulheres",baptizado:true,dataBaptismo:"2010-06-05",telefone:"",obs:"Guia Leiga",autor:"admin"},
  {id:5,nome:"Eva Francisco Ernesto",classe:"Castro João dos Santos",sexo:"Feminino",status:"Efectivo",organismo:"Organização das Mulheres",baptizado:true,dataBaptismo:"2014-03-15",telefone:"",obs:"Guia de Classe",autor:"admin"},
  {id:6,nome:"Adão António Ernesto",classe:"Castro João dos Santos",sexo:"Masculino",status:"Efectivo",organismo:"Organização dos Homens",baptizado:true,dataBaptismo:"2011-11-27",telefone:"",obs:"Presidente da Junta",autor:"admin"},
  {id:7,nome:"Florinda André João",classe:"Revº Diogo de Sousa",sexo:"Feminino",status:"Efectivo",organismo:"Organização das Mulheres",baptizado:true,dataBaptismo:"2009-06-14",telefone:"",obs:"Guia de Classe",autor:"admin"},
  {id:8,nome:"Marquinha Miguel",classe:"Revº Diogo de Sousa",sexo:"Feminino",status:"Efectivo",organismo:"Organização das Mulheres",baptizado:true,dataBaptismo:"2015-03-22",telefone:"",obs:"Evangelismo e Oração",autor:"admin"},
];

let utilizador=null,membros=[],tab="lista",modal=null,confirmar=null;
const CHAVE="cm_benjamim_v2";

function carregar(){try{const d=localStorage.getItem(CHAVE);return d?JSON.parse(d).membros:DADOS_INICIAIS;}catch(e){return DADOS_INICIAIS;}}
function guardar(m){try{localStorage.setItem(CHAVE,JSON.stringify({membros:m,ts:Date.now()}));}catch(e){}}
function toast(msg,ok){const t=document.createElement("div");t.className="toast";t.style.background=ok?COR.verde:"#E65100";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function logo(s){return`<svg viewBox="0 0 200 230" width="${s}" height="${s}"><path d="M68 222 C54 194 22 176 20 144 C18 116 38 104 44 82 C49 63 40 46 47 30 C54 14 70 7 79 0 C72 20 76 36 84 50 C90 62 88 73 83 87 C77 105 65 116 67 138 C69 156 83 167 88 185 C93 198 91 212 87 224 Z" fill="#D32F2F"/><path d="M68 222 C54 194 22 176 20 144 C18 116 38 104 44 82 C49 63 40 46 47 30 C60 44 65 60 60 78 C55 96 42 108 46 130 C49 150 64 161 68 180 C72 195 70 208 68 222 Z" fill="white" opacity="0.3"/><rect x="102" y="12" width="20" height="206" rx="3" fill="#111"/><rect x="70" y="70" width="116" height="20" rx="3" fill="#111"/></svg>`;}
function badge(s){const m={Efectivo:{bg:"#E8F5E9",c:"#1B5E20"},"Catecúmeno":{bg:"#E3F2FD",c:"#0D47A1"},"À Prova":{bg:"#FFF3E0",c:"#E65100"},Falecido:{bg:"#EFEBE9",c:"#4E342E"},Transferido:{bg:"#F3E5F5",c:"#6A1B9A"}};const x=m[s]||{bg:"#eee",c:"#555"};return`<span class="badge" style="background:${x.bg};color:${x.c}">${s}</span>`;}

// Membros visíveis conforme o perfil
function membroVisiveis(){
  if(utilizador.perfil==="admin") return membros;
  return membros.filter(m=>m.autor===utilizador.id);
}

// Verificar duplicado por nome
function nomeDuplicado(nome,idExcluir){
  return membros.some(m=>m.nome.trim().toLowerCase()===nome.trim().toLowerCase()&&m.id!==idExcluir);
}

function render(){document.getElementById("root").innerHTML=utilizador?appHTML():loginHTML();bind();}

function loginHTML(){
  const perfis=[{label:"Admin",cor:COR.azul,icone:"🔐"},{label:"Editor",cor:COR.verde,icone:"✏️"},{label:"Leitor",cor:COR.dourado,icone:"👁"}];
  return`<div style="min-height:100vh;background:linear-gradient(145deg,#1F3864,#2E5096);display:flex;align-items:center;justify-content:center;padding:16px">
  <div style="background:#fff;border-radius:20px;width:100%;max-width:380px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.4)">
  <div style="background:linear-gradient(135deg,#1F3864,#2E5096);padding:28px;text-align:center">${logo(60)}
  <div style="color:#fff;font-weight:800;font-size:17px;font-family:Georgia,serif;margin-top:10px">Base de Dados de Membros</div>
  <div style="color:#ffffffbb;font-size:12px;margin-top:3px">Centro Missionário Revº. Benjamim Manuel</div></div>
  <div style="padding:24px">
  <div style="text-align:center;margin-bottom:18px">
  <div style="font-size:15px;font-weight:700;color:#1F3864;font-family:Georgia,serif">🔑 Acesso ao Sistema</div>
  <div style="font-size:12px;color:#999;margin-top:3px">Introduz o teu código de acesso</div></div>
  <div style="display:flex;gap:8px;margin-bottom:18px">
  ${perfis.map(p=>`<div style="flex:1;background:${p.cor}11;border:1.5px solid ${p.cor}33;border-radius:10px;padding:10px 6px;text-align:center"><div style="font-size:18px">${p.icone}</div><div style="font-size:10px;font-weight:700;color:${p.cor};text-transform:uppercase">${p.label}</div></div>`).join("")}
  </div>
  <label>Código de Acesso</label>
  <input id="codigo" type="password" placeholder="Introduz o código" style="margin-bottom:6px;letter-spacing:0.2em;font-family:monospace;font-size:15px;font-weight:700"/>
  <div id="erro-login" style="color:#E65100;font-size:12px;margin-bottom:10px;display:none"></div>
  <button class="btn btn-primary" id="btn-entrar" style="width:100%;padding:12px;font-size:15px">Entrar →</button>
  </div></div></div>`;}

function appHTML(){
  const pode={admin:true,editar:utilizador.perfil!=="leitor",eliminar:utilizador.perfil==="admin",gerir:utilizador.perfil==="admin"};
  const visiv=membroVisiveis();
  const act=visiv.filter(m=>!["Falecido","Transferido"].includes(m.status));
  const stats={total:act.length,masc:act.filter(m=>m.sexo==="Masculino").length,fem:act.filter(m=>m.sexo==="Feminino").length,catec:act.filter(m=>m.status==="Catecúmeno").length,prova:act.filter(m=>m.status==="À Prova").length,efect:act.filter(m=>m.status==="Efectivo").length,falec:visiv.filter(m=>m.status==="Falecido").length,bapt:act.filter(m=>m.baptizado).length};
  return`<div class="header">
  <div>${logo(44)}</div>
  <div><div class="header-title">Base de Dados de Membros</div>
  <div class="header-sub">CM Revº. Benjamim Manuel · ${utilizador.icone} ${utilizador.nome}</div></div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
  <div style="color:#fff;font-size:20px;font-weight:900;font-family:Georgia,serif">${stats.total}<span style="font-size:10px;opacity:0.7;margin-left:3px">membros</span></div>
  ${pode.gerir?`<button class="btn" id="btn-gerir" style="background:rgba(255,255,255,0.15);color:#fff;font-size:11px;padding:4px 8px">⚙️</button>`:""}
  <button class="btn" id="btn-sair" style="background:rgba(255,0,0,0.2);color:#ffaaaa;font-size:11px;padding:4px 8px">Sair</button></div></div>
  ${utilizador.perfil==="editor"?`<div style="background:rgba(27,94,32,0.2);padding:5px 16px;font-size:12px;color:#A5D6A7">✏️ Modo editor — vês e editas apenas os membros que registaste.</div>`:""}
  ${utilizador.perfil==="leitor"?`<div style="background:rgba(123,63,0,0.25);padding:5px 16px;font-size:12px;color:#FFD180">👁 Modo leitura — vês apenas os membros que registaste.</div>`:""}
  <div class="tabs">
  <button class="tab ${tab==="lista"?"active":""}" data-tab="lista">📋 Rol</button>
  <button class="tab ${tab==="estat"?"active":""}" data-tab="estat">📊 Estatística</button>
  <button class="tab ${tab==="rel"?"active":""}" data-tab="rel">📄 Relatório</button>
  </div>
  <div class="content">
  ${tab==="lista"?listaHTML(pode,stats,visiv):""}
  ${tab==="estat"?estatHTML(stats,act):""}
  ${tab==="rel"?relHTML(stats,visiv):""}
  </div>
  ${modal?modalHTML():""}
  ${confirmar?confirmarHTML():""}
  ${tab==="gerir"?gerirHTML():""}`;
}

function listaHTML(pode,stats,visiv){
  const busca=(document.getElementById("busca")||{}).value||"";
  const fClasse=(document.getElementById("fClasse")||{}).value||"Todas";
  const fStatus=(document.getElementById("fStatus")||{}).value||"Todos";
  const filt=visiv.filter(m=>{
    if(busca&&!m.nome.toLowerCase().includes(busca.toLowerCase())&&!(m.obs||"").toLowerCase().includes(busca.toLowerCase()))return false;
    if(fClasse!=="Todas"&&m.classe!==fClasse)return false;
    if(fStatus!=="Todos"&&m.status!==fStatus)return false;
    return true;});
  return`<div class="filters">
  <input id="busca" placeholder="🔍 Buscar nome..." value="${busca}" oninput="render()"/>
  <select id="fClasse" onchange="render()"><option value="Todas">Todas as Classes</option>${CLASSES.map(c=>`<option ${fClasse===c?"selected":""}>${c}</option>`).join("")}</select>
  <select id="fStatus" onchange="render()"><option value="Todos">Todos os Estados</option>${STATUS.map(s=>`<option ${fStatus===s?"selected":""}>${s}</option>`).join("")}</select>
  ${pode.editar?`<button class="btn btn-primary" id="btn-novo">➕ Novo Membro</button>`:""}
  </div>
  <div style="font-size:12px;color:#888;margin-bottom:8px">${filt.length} de ${visiv.length} membros${utilizador.perfil!=="admin"?" (registados por mim)":""}</div>
  <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07)">
  <div style="overflow-x:auto"><table><thead><tr>
  <th>Nº</th><th>Nome</th><th>Classe</th><th>Sx</th><th>Estado</th><th>Bap.</th><th>Obs.</th>
  ${pode.editar||pode.eliminar?"<th>Acções</th>":""}
  </tr></thead><tbody>
  ${filt.length===0?`<tr><td colspan="8" style="text-align:center;padding:40px;color:#ccc">${visiv.length===0?"Ainda não registaste nenhum membro.":"Nenhum membro encontrado."}</td></tr>`:
  filt.map((m,i)=>`<tr style="background:${i%2===0?"#fafbff":"#fff"}">
  <td style="color:#ccc;font-size:10px">${m.id}</td>
  <td style="font-weight:700;color:#1F3864;white-space:nowrap">${m.nome}</td>
  <td style="font-size:11px;color:#777">${m.classe.replace("Revº ","")}</td>
  <td style="font-size:13px;color:${m.sexo==="Masculino"?"#1565C0":"#880E4F"};font-weight:700">${m.sexo==="Masculino"?"♂":"♀"}</td>
  <td>${badge(m.status)}</td>
  <td style="text-align:center">${m.baptizado?`<span style="color:#1B5E20">✓</span>`:"—"}</td>
  <td style="font-size:11px;color:#aaa;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.obs||"—"}</td>
  ${pode.editar||pode.eliminar?`<td style="white-space:nowrap">
  ${pode.editar?`<button class="btn btn-edit" style="padding:4px 8px;font-size:11px;margin-right:3px" onclick="abrirModal(${m.id})">✏️</button>`:""}
  ${pode.eliminar?`<button class="btn btn-danger" style="padding:4px 8px;font-size:11px" onclick="confirmarDel(${m.id})">🗑</button>`:""}
  </td>`:""}
  </tr>`).join("")}
  </tbody></table></div></div>`;}

function estatHTML(stats,act){
  return`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
  ${[["👥","Total",stats.total,"♂"+stats.masc+" ♀"+stats.fem,COR.azul],["📖","Catecúmenos",stats.catec,"Em formação","#1565C0"],["🔔","À Prova",stats.prova,"Candidatos","#E65100"],["✝","Efectivos",stats.efect,"Membros plenos",COR.verde],["💧","Baptizados",stats.bapt,Math.round(stats.bapt/Math.max(stats.total,1)*100)+"%","#0277BD"],["🕊","Falecidos",stats.falec,"Registo",COR.cinza]].map(([ic,lb,vl,sb,cr])=>`<div class="card" style="--c:${cr}"><div style="font-size:18px">${ic}</div><div class="card-val">${vl}</div><div class="card-lbl">${lb}</div><div style="font-size:9px;color:#aaa;margin-top:1px">${sb}</div></div>`).join("")}
  </div>
  ${utilizador.perfil!=="admin"?`<div class="aviso">⚠️ A estatística mostra apenas os membros que registaste.</div>`:""}
  <div style="background:#fff;border-radius:12px;padding:18px">
  <h3 style="color:#1F3864;font-family:Georgia,serif;font-size:15px;border-bottom:2px solid #7B3F00;padding-bottom:5px;margin-bottom:12px">📍 Por Classe</h3>
  <div style="overflow-x:auto"><table><thead><tr><th>Classe</th><th>Total</th><th>♂</th><th>♀</th><th>Cat.</th><th>Prova</th><th>Efect.</th><th>Bapt.</th></tr></thead><tbody>
  ${CLASSES.map((c,i)=>{const a=act.filter(m=>m.classe===c);return`<tr style="background:${i%2===0?"#fafbff":"#fff"}">
  <td style="font-weight:700;color:#1F3864">${c}</td>
  <td style="font-weight:900;font-size:14px;color:#7B3F00">${a.length}</td>
  <td style="color:#1565C0">${a.filter(m=>m.sexo==="Masculino").length}</td>
  <td style="color:#880E4F">${a.filter(m=>m.sexo==="Feminino").length}</td>
  <td>${a.filter(m=>m.status==="Catecúmeno").length}</td>
  <td style="color:#E65100">${a.filter(m=>m.status==="À Prova").length}</td>
  <td style="color:#1B5E20;font-weight:700">${a.filter(m=>m.status==="Efectivo").length}</td>
  <td style="color:#0277BD">${a.filter(m=>m.baptizado).length}</td></tr>`;}).join("")}
  <tr style="background:#FFE0B2"><td style="font-weight:800">TOTAL</td><td style="font-weight:900;font-size:14px">${stats.total}</td><td style="font-weight:700">${stats.masc}</td><td style="font-weight:700">${stats.fem}</td><td style="font-weight:700">${stats.catec}</td><td style="font-weight:700">${stats.prova}</td><td style="font-weight:700">${stats.efect}</td><td style="font-weight:700">${stats.bapt}</td></tr>
  </tbody></table></div></div>`;}

function relHTML(stats,visiv){
  const act=visiv.filter(m=>!["Falecido","Transferido"].includes(m.status));
  return`<div style="background:#fff;border-radius:12px;padding:24px">
